<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Open IoT - Self-hostable IoT device management platform">
  <title>Open IoT – Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">⚡</div>
        <h1>Open<span>IoT</span></h1>
        <p>Manage your IoT devices, anywhere.</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')" id="tab-login">Sign In</button>
        <button class="auth-tab" onclick="showTab('register')" id="tab-register">Register</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="login-username">Username or Email</label>
          <input type="text" id="login-username" class="input" placeholder="your_username" required
            autocomplete="username">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="input" placeholder="••••••••" required
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          <span>Sign In</span>
          <span>→</span>
        </button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form class="auth-form hidden" id="register-form" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label for="reg-name">Display Name</label>
          <input type="text" id="reg-name" class="input" placeholder="John Doe" required>
        </div>
        <div class="input-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" class="input" placeholder="johndoe" required autocomplete="username">
        </div>
        <div class="input-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" class="input" placeholder="john@example.com" required autocomplete="email">
        </div>
        <div class="input-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" class="input" placeholder="Min. 6 characters" required minlength="6"
            autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" id="reg-btn">
          <span>Create Account</span>
          <span>→</span>
        </button>
      </form>

      <div class="auth-footer">
        Self-hosted & open-source · <a href="https://github.com/openiot">GitHub</a>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
