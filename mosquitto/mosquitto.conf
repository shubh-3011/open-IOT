# Mosquitto MQTT Broker Configuration for Open IoT
# ─────────────────────────────────────────────────

# Listener
listener 1883
protocol mqtt

# WebSocket support (for browser clients)
listener 9001
protocol websockets

# Authentication
allow_anonymous true
# For production, set allow_anonymous false and use:
# password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
